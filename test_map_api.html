<!DOCTYPE html>
<html>
<head>
    <title>Bakery Finder with Toggle Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        #map-container {
            display: none;
        }
        #map {
            height: 400px;
            width: 100%;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
        #search-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        #pac-input {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .button {
            padding: 10px 16px;
            margin-left: 10px;
            cursor: pointer;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .button:hover {
            background-color: #3367d6;
        }
        #results-container {
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
        }
        #results-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .result-item {
            margin-bottom: 15px;
            cursor: pointer;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .result-item:hover {
            background-color: #f0f0f0;
        }
        .place-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .place-address {
            color: #555;
            font-size: 14px;
        }
        .place-rating {
            color: #d32f2f;
            margin-top: 5px;
        }
        h1 {
            color: #4285F4;
        }
        .no-results {
            text-align: center;
            padding: 20px;
            color: #555;
        }
        .toggle-map {
            text-align: center;
            margin-bottom: 15px;
        }
        .gm-style-iw {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Bakery Finder</h1>
    
    <div id="search-container">
        <input id="pac-input" type="text" placeholder="Search for bakeries" value="bakeries">
        <button id="search-button" class="button">Search</button>
        <button id="current-location-btn" class="button">My Location</button>
    </div>
    
    <div class="toggle-map">
        <button id="toggle-map-btn" class="button">Show Map</button>
    </div>
    
    <div id="map-container">
        <div id="map"></div>
    </div>
    
    <!-- Results list container -->
    <div id="results-container">
        <h2>Bakeries Near You</h2>
        <div id="results-list">
            <div class="no-results">Search for bakeries to see results</div>
        </div>
    </div>

    <script>
        function initMap() {
            // Default location (will be overridden if geolocation works)
            const defaultLocation = { lat: -34.397, lng: 150.644 };
            
            // Create the map
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 13,
                center: defaultLocation,
            });
            
            // Create an info window to share between markers
            const infoWindow = new google.maps.InfoWindow();
            
            // DOM Elements
            const input = document.getElementById("pac-input");
            const searchButton = document.getElementById("search-button");
            const toggleMapBtn = document.getElementById("toggle-map-btn");
            const mapContainer = document.getElementById("map-container");
            const resultsContainer = document.getElementById("results-container");
            const resultsList = document.getElementById("results-list");
            
            // Toggle map visibility
            let mapVisible = false;
            toggleMapBtn.addEventListener("click", () => {
                mapVisible = !mapVisible;
                mapContainer.style.display = mapVisible ? "block" : "none";
                toggleMapBtn.textContent = mapVisible ? "Hide Map" : "Show Map";
                
                // Trigger resize event to fix map display issues
                if (mapVisible) {
                    google.maps.event.trigger(map, 'resize');
                }
            });
            
            // Try to get user's current location immediately
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                        };
                        
                        // Center map on user's location
                        map.setCenter(userLocation);
                        
                        // Add a marker at the user's location
                        new google.maps.Marker({
                            position: userLocation,
                            map: map,
                            title: "Your Location",
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 10,
                                fillColor: "#4285F4",
                                fillOpacity: 1,
                                strokeColor: "#FFFFFF",
                                strokeWeight: 2,
                            },
                        });
                        
                        // Automatically search for bakeries near the user's location
                        searchNearby(userLocation, "bakery");
                    },
                    () => {
                        console.log("Error: The Geolocation service failed or permission denied.");
                        // Still try to search with default value
                        performPlacesSearch();
                    }
                );
            } else {
                console.log("Geolocation is not supported by this browser.");
                // Still try to search with default value
                performPlacesSearch();
            }
            
            // Make the "My Location" button functional
            document.getElementById("current-location-btn").addEventListener("click", () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const userLocation = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude,
                            };
                            
                            map.setCenter(userLocation);
                            map.setZoom(14);
                            
                            // Search for bakeries near the user's current location
                            searchNearby(userLocation, "bakery");
                        },
                        () => {
                            alert("Unable to retrieve your location. Please check your browser settings.");
                        }
                    );
                } else {
                    alert("Geolocation is not supported by this browser.");
                }
            });
            
            // Setup Places service
            const placesService = new google.maps.places.PlacesService(map);
            
            // Create the search box
            const searchBox = new google.maps.places.SearchBox(input);
            
            // Bias the SearchBox results towards current map's viewport
            map.addListener("bounds_changed", () => {
                searchBox.setBounds(map.getBounds());
            });
            
            // Listen for search button click
            searchButton.addEventListener("click", performPlacesSearch);
            
            // Listen for Enter key in search box
            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    performPlacesSearch();
                }
            });
            
            // Listen for the event fired when the user selects a prediction
            searchBox.addListener("places_changed", performPlacesSearch);
            
            let markers = [];
            
            // Function to perform search using Places API
            function performPlacesSearch() {
                const places = searchBox.getPlaces();
                
                if (places && places.length > 0) {
                    processSearchResults(places);
                } else {
                    // If SearchBox doesn't return places, use the Places Service directly
                    const searchQuery = input.value + " bakery";
                    
                    const request = {
                        query: searchQuery,
                        fields: ['name', 'geometry', 'formatted_address', 'rating', 'place_id']
                    };
                    
                    placesService.textSearch(request, (results, status) => {
                        if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                            processSearchResults(results);
                        } else {
                            resultsList.innerHTML = `<div class="no-results">No bakeries found. Try a different search.</div>`;
                        }
                    });
                }
            }
            
            // Function to search for places near a location
            function searchNearby(location, type) {
                const request = {
                    location: location,
                    radius: 2000, // 2km radius
                    type: type,
                    keyword: "bakery"
                };
                
                placesService.nearbySearch(request, (results, status) => {
                    if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                        processSearchResults(results);
                    } else {
                        resultsList.innerHTML = `<div class="no-results">No bakeries found nearby. Try searching for a specific location.</div>`;
                    }
                });
            }
            
            // Process and display search results
            function processSearchResults(places) {
                // Clear out the old markers
                markers.forEach((marker) => {
                    marker.setMap(null);
                });
                markers = [];
                
                // Clear the results list
                resultsList.innerHTML = "";
                
                if (places.length === 0) {
                    resultsList.innerHTML = `<div class="no-results">No bakeries found. Try a different search.</div>`;
                    return;
                }
                
                // For each place, create a marker and list item
                const bounds = new google.maps.LatLngBounds();
                
                places.forEach((place, i) => {
                    if (!place.geometry || !place.geometry.location) {
                        console.log("Returned place contains no geometry");
                        return;
                    }
                    
                    // Get place details for display
                    const placeName = place.name;
                    const placeAddress = place.formatted_address || place.vicinity || "";
                    const placeRating = place.rating ? `Rating: ${place.rating} ★` : "No ratings yet";
                    
                    // Create a marker for each place with a red pin
                    const marker = new google.maps.Marker({
                        map,
                        title: placeName,
                        position: place.geometry.location,
                        animation: google.maps.Animation.DROP,
                        icon: {
                            path: google.maps.SymbolPath.MARKER,
                            fillColor: "#ff0000",
                            fillOpacity: 1,
                            strokeWeight: 0,
                            scale: 10
                        }
                    });
                    
                    markers.push(marker);
                    
                    // Create info window content
                    const contentString = `
                        <div>
                            <h3>${placeName}</h3>
                            <p>${placeAddress}</p>
                            <p>${placeRating}</p>
                        </div>
                    `;
                    
                    // Add click listener to open info window when marker is clicked
                    marker.addListener("click", () => {
                        infoWindow.close();
                        infoWindow.setContent(contentString);
                        infoWindow.open(map, marker);
                    });
                    
                    // Add this place to the results list
                    const resultItem = document.createElement("div");
                    resultItem.className = "result-item";
                    resultItem.innerHTML = `
                        <div class="place-name">${placeName}</div>
                        <div class="place-address">${placeAddress}</div>
                        <div class="place-rating">${placeRating}</div>
                    `;
                    
                    // Add click event to result item
                    resultItem.addEventListener("click", () => {
                        // Show map if it's hidden
                        if (!mapVisible) {
                            mapVisible = true;
                            mapContainer.style.display = "block";
                            toggleMapBtn.textContent = "Hide Map";
                            // Trigger resize to fix map display
                            google.maps.event.trigger(map, 'resize');
                        }
                        
                        // Center map on this place
                        map.setCenter(place.geometry.location);
                        map.setZoom(16);
                        
                        // Open info window
                        infoWindow.close();
                        infoWindow.setContent(contentString);
                        infoWindow.open(map, marker);
                        
                        // Scroll to map
                        mapContainer.scrollIntoView({ behavior: 'smooth' });
                    });
                    
                    resultsList.appendChild(resultItem);
                    
                    if (place.geometry.viewport) {
                        bounds.union(place.geometry.viewport);
                    } else {
                        bounds.extend(place.geometry.location);
                    }
                });
                
                map.fitBounds(bounds);
            }
        }
    </script>

    <!-- Load the Google Maps JavaScript API with Places library -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCTiRPlMIfN1RO0qDjvJOO7W1QYjh0TWnU&libraries=places&callback=initMap"
        async
        defer
    ></script>
</body>
</html>
